<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>건강 코치 에이전트</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header>
  <span class="logo">🌿</span>
  <span class="brand">건강 코치 에이전트</span>
  <span class="tagline">AI 기반 맞춤 건강 추천</span>
</header>

<main>

  <!-- ── 입력 폼 ──────────────────────────────── -->
  <div id="form-section">

    <!-- 건강 목표 (다중 선택, 최대 2개) -->
    <div class="card">
      <p class="section-label">Step 1</p>
      <p class="section-title">건강 목표를 선택해주세요 <span class="multi-hint">최대 2개</span></p>
      <div class="goal-grid">
        <button class="goal-btn" data-value="피로 관리"    onclick="selectGoal(this)"><span class="icon">⚡</span>피로 관리</button>
        <button class="goal-btn" data-value="수면 관리"    onclick="selectGoal(this)"><span class="icon">🌙</span>수면 관리</button>
        <button class="goal-btn" data-value="면역 관리"    onclick="selectGoal(this)"><span class="icon">🛡️</span>면역 관리</button>
        <button class="goal-btn" data-value="눈 건강"      onclick="selectGoal(this)"><span class="icon">👁️</span>눈 건강</button>
        <button class="goal-btn" data-value="장 건강"      onclick="selectGoal(this)"><span class="icon">🌱</span>장 건강</button>
        <button class="goal-btn" data-value="뼈 건강"      onclick="selectGoal(this)"><span class="icon">🦴</span>뼈 건강</button>
        <button class="goal-btn" data-value="피부·항산화"  onclick="selectGoal(this)"><span class="icon">✨</span>피부·항산화</button>
        <button class="goal-btn" data-value="체중 관리"    onclick="selectGoal(this)"><span class="icon">⚖️</span>체중 관리</button>
        <button class="goal-btn" data-value="혈당 관리"    onclick="selectGoal(this)"><span class="icon">🩺</span>혈당 관리</button>
        <button class="goal-btn" data-value="스트레스 관리" onclick="selectGoal(this)"><span class="icon">🧘</span>스트레스 관리</button>
        <button class="goal-btn" data-value="운동 관리"    onclick="selectGoal(this)"><span class="icon">🏋️</span>운동 관리</button>
        <button class="goal-btn" data-value="심혈관 건강"  onclick="selectGoal(this)"><span class="icon">❤️</span>심혈관 건강</button>
        <button class="goal-btn" data-value="모발 건강"    onclick="selectGoal(this)"><span class="icon">💇</span>모발 건강</button>
        <button class="goal-btn" data-value="간 건강"      onclick="selectGoal(this)"><span class="icon">🫀</span>간 건강</button>
      </div>
      <div id="goal-selected-display" class="goal-selected-display" style="display:none"></div>
    </div>

    <!-- 연령대 -->
    <div class="card">
      <p class="section-label">Step 2</p>
      <p class="section-title">연령대를 선택해주세요</p>
      <div class="chip-group" id="age-group">
        <button class="chip" data-value="10대"      onclick="selectChip('age', this)">10대</button>
        <button class="chip" data-value="20대"      onclick="selectChip('age', this)">20대</button>
        <button class="chip" data-value="30대"      onclick="selectChip('age', this)">30대</button>
        <button class="chip" data-value="40대"      onclick="selectChip('age', this)">40대</button>
        <button class="chip" data-value="50대 이상" onclick="selectChip('age', this)">50대 이상</button>
      </div>
    </div>

    <!-- 성별 -->
    <div class="card">
      <p class="section-label">Step 3</p>
      <p class="section-title">성별을 선택해주세요</p>
      <div class="chip-group" id="gender-group">
        <button class="chip" data-value="여성" onclick="selectChip('gender', this)">여성</button>
        <button class="chip" data-value="남성" onclick="selectChip('gender', this)">남성</button>
      </div>
    </div>

    <!-- 오류 -->
    <div class="error-box" id="error-box"></div>

    <!-- 실행 버튼 -->
    <button class="btn-run" id="run-btn" onclick="runPipeline()" disabled>
      <span>🔍</span> 맞춤 추천 받기
    </button>
  </div>

  <!-- ── 로딩 (Progress bar) ───────────────────── -->
  <div class="card" id="loading" style="display:none">
    <div class="progress-header">
      <p class="loading-msg" id="loading-msg">건강 데이터를 분석하고 있습니다…</p>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-steps" id="progress-steps">
      <div class="pstep" id="ps1">🎯 목표 분석</div>
      <div class="pstep" id="ps2">🥗 음식 추천</div>
      <div class="pstep" id="ps3">💊 영양 성분</div>
      <div class="pstep" id="ps4">🔍 최종 검증</div>
    </div>
  </div>

  <!-- ── 결과 ──────────────────────────────────── -->
  <div id="result" style="display:none">
    <div class="card">
      <div class="result-header">
        <span class="result-badge">✅ 추천 완료</span>
        <div class="result-actions">
          <button class="btn-action" onclick="shareResult()" title="링크 복사">🔗 공유</button>
          <button class="btn-action" onclick="saveResult()" title="저장">💾 저장</button>
          <button class="btn-reset" onclick="reset()">← 다시 입력</button>
        </div>
      </div>
      <!-- 저장된 결과 불러오기 배너 -->
      <div id="saved-banner" class="saved-banner" style="display:none">
        💾 저장된 추천 결과입니다.
        <button onclick="document.getElementById('saved-banner').style.display='none'" class="banner-close">✕</button>
      </div>
      <div id="result-content"></div>
    </div>
  </div>

</main>

<script>
const state = { goals: [], age: '', gender: '' };
let lastMeta = null;

// ── 아이콘 맵 ────────────────────────────────────
const FOOD_ICONS = {
  '블루베리':'🫐','토마토':'🍅','아보카도':'🥑','연어':'🐟','고등어':'🐟',
  '브로콜리':'🥦','시금치':'🥬','견과류':'🥜','아몬드':'🥜','호두':'🥜',
  '달걀':'🥚','요거트':'🥛','우유':'🥛','따뜻한 우유':'🥛','치즈':'🧀',
  '귤':'🍊','오렌지':'🍊','키위':'🥝','바나나':'🍌','사과':'🍎',
  '포도':'🍇','딸기':'🍓','당근':'🥕','고구마':'🍠','현미':'🍚',
  '오트밀':'🌾','두부':'🫘','콩':'🫘','김치':'🥗','녹차':'🍵',
  '체리':'🍒','올리브유':'🫒','아마씨':'🌱','블루베리 스무디':'🫐',
  '닭가슴살':'🍗','귀리':'🌾','다크초콜릿':'🍫','고구마':'🍠',
  '멸치':'🐟','강황':'🫚','파프리카':'🫑','마늘':'🧄',
};
const HABIT_KEYWORDS = [
  ['걷기','🚶'],['달리기','🏃'],['운동','🏋️'],['스트레칭','🤸'],
  ['수면','😴'],['취침','🌙'],['잠','😴'],['물','💧'],['수분','💧'],
  ['자외선','☀️'],['선크림','☀️'],['보습','💆'],['세안','🧴'],
  ['명상','🧘'],['호흡','🌬️'],['식사','🍽️'],['채소','🥗'],
  ['금연','🚭'],['금주','🚫'],['햇빛','🌞'],['야외','🌿'],
  ['스마트폰','📵'],['블루라이트','📵'],['스크린','📵'],['규칙적','⏰'],
  ['마사지','💆'],['씹기','🍽️'],['야식','🌙'],['절주','🚫'],
];
const NUTRIENT_ICONS = {
  '철분':'🩸','비타민 B12':'⚡','마그네슘':'💪','코엔자임 Q10':'🔋',
  '멜라토닌':'🌙','L-테아닌':'🍵','비타민 C':'🍊','비타민 D':'☀️',
  '아연':'🛡️','루테인':'👁️','지아잔틴':'👁️','오메가-3':'🐟',
  '프로바이오틱스':'🌱','프리바이오틱스':'🌱','식이섬유':'🌾',
  '칼슘':'🦴','콜라겐':'✨','글루타치온':'💎','단백질 보충제':'💪',
  '녹차 추출물':'🍵','크롬':'🔬','베르베린':'🌿','알파리포산':'⚡',
  '아슈와간다':'🌿','BCAA':'💪','비오틴':'💇','밀크씨슬':'🌱',
  'NAC':'🔬','비타민 E':'🌻','식이섬유 (프리바이오틱스)':'🌾',
};

function foodIcon(n)     { return FOOD_ICONS[n] || '🥗'; }
function habitIcon(t)    { for(const[k,i] of HABIT_KEYWORDS) if(t.includes(k)) return i; return '✅'; }
function nutrientIcon(n) { return NUTRIENT_ICONS[n] || '💊'; }

// ── 건강 목표 다중 선택 (최대 2개) ──────────────
function selectGoal(el) {
  const val = el.dataset.value;
  const idx = state.goals.indexOf(val);
  if (idx !== -1) {
    state.goals.splice(idx, 1);
    el.classList.remove('active');
  } else {
    if (state.goals.length >= 2) {
      // 가장 먼저 선택한 것 해제
      const first = state.goals.shift();
      document.querySelector(`.goal-btn[data-value="${first}"]`)?.classList.remove('active');
    }
    state.goals.push(val);
    el.classList.add('active');
  }
  updateGoalDisplay();
  updateBtn();
}

function updateGoalDisplay() {
  const disp = document.getElementById('goal-selected-display');
  if (state.goals.length === 0) { disp.style.display = 'none'; return; }
  disp.style.display = 'flex';
  disp.innerHTML = state.goals.map(g => `<span class="goal-chip-selected">${g}</span>`).join('<span class="goal-chip-arrow">→</span>');
}

function selectChip(type, el) {
  const group = type === 'age' ? 'age-group' : 'gender-group';
  document.querySelectorAll(`#${group} .chip`).forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (type === 'age') state.age = el.dataset.value;
  else state.gender = el.dataset.value;
  updateBtn();
}

function updateBtn() {
  document.getElementById('run-btn').disabled = !(state.goals.length > 0 && state.age && state.gender);
}

// ── Progress bar ─────────────────────────────────
const STEPS = [
  { id:'ps1', pct:20, msg:'목표를 분석하고 있습니다…' },
  { id:'ps2', pct:45, msg:'맞춤 음식을 추천하고 있습니다…' },
  { id:'ps3', pct:70, msg:'영양 성분을 선정하고 있습니다…' },
  { id:'ps4', pct:90, msg:'최종 플랜을 작성하고 있습니다…' },
];
let stepTimer = null, stepIdx = 0;

function startProgress() {
  stepIdx = 0;
  setProgress(0, '분석을 시작합니다…');
  document.querySelectorAll('.pstep').forEach(e => e.classList.remove('active','done'));
  stepTimer = setInterval(() => {
    if (stepIdx >= STEPS.length) { clearInterval(stepTimer); return; }
    const s = STEPS[stepIdx];
    document.getElementById(s.id).classList.add('active');
    if (stepIdx > 0) document.getElementById(STEPS[stepIdx-1].id).classList.replace('active','done');
    setProgress(s.pct, s.msg);
    stepIdx++;
  }, 1800);
}

function setProgress(pct, msg) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('loading-msg').textContent = msg;
}

function stopProgress() {
  clearInterval(stepTimer);
  setProgress(100, '완료!');
  document.querySelectorAll('.pstep').forEach(e => e.classList.replace('active','done'));
  STEPS.forEach(s => document.getElementById(s.id).classList.add('done'));
}

// ── 파이프라인 실행 ──────────────────────────────
async function runPipeline() {
  const err = document.getElementById('error-box');
  err.style.display = 'none';
  document.getElementById('form-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  startProgress();

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ health_goals: state.goals, age_group: state.age, gender: state.gender }),
    });
    const data = await res.json();
    stopProgress();
    await new Promise(r => setTimeout(r, 400));
    document.getElementById('loading').style.display = 'none';

    if (!res.ok || !data.success) { showError(data.error || '알 수 없는 오류가 발생했습니다.'); return; }

    lastMeta = data.meta;
    renderResultCards(data.meta);
    document.getElementById('result').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });

  } catch (e) {
    stopProgress();
    document.getElementById('loading').style.display = 'none';
    showError('서버 연결에 실패했습니다: ' + e.message);
  }
}

// ── 카드 렌더링 ──────────────────────────────────
function renderResultCards(meta) {
  const el = document.getElementById('result-content');
  const rec = meta.recommendations || {};
  const prof = meta.profile || {};
  const ranks = ['①','②','③','④','⑤'];
  let html = '';

  // 메타 배지
  html += `<div class="result-meta-badges">`;
  const goals = meta.goal_labels || [meta.goal_label];
  goals.filter(Boolean).forEach(g => html += `<span class="meta-badge meta-badge-goal">🎯 ${g}</span>`);
  if (prof.age_label)    html += `<span class="meta-badge meta-badge-age">${prof.age_label}</span>`;
  if (prof.gender_label) html += `<span class="meta-badge meta-badge-gender">${prof.gender_label}</span>`;
  html += `</div>`;

  if (meta.top_warning) html += `<div class="warning-banner">⚠️ ${meta.top_warning}</div>`;

  // 음식
  const foods = rec.foods || [];
  if (foods.length) {
    html += `<div class="result-section"><div class="result-section-title"><span>🥗</span> 추천 음식</div><div class="food-grid">`;
    for (const f of foods) {
      html += `<div class="food-card">
        <div class="food-card-icon">${foodIcon(f.name)}</div>
        <div class="food-card-name">${f.name}</div>
        <div class="food-card-reason">${f.reason || ''}</div>
        ${f.serving_suggestion ? `<div class="food-card-tip">🍽️ ${f.serving_suggestion}</div>` : ''}
      </div>`;
    }
    html += `</div></div>`;
  }

  // 습관
  const habits = rec.habits || [];
  if (habits.length) {
    html += `<div class="result-section"><div class="result-section-title"><span>🏃</span> 생활습관 제안</div><div class="habit-list">`;
    for (const h of habits) {
      const dc = h.difficulty === '쉬움' ? 'badge-easy' : 'badge-medium';
      html += `<div class="habit-card">
        <div class="habit-card-icon">${habitIcon(h.title)}</div>
        <div class="habit-card-body">
          <div class="habit-card-header">
            <span class="habit-card-title">${h.title}</span>
            ${h.difficulty ? `<span class="badge ${dc}">${h.difficulty}</span>` : ''}
            ${h.frequency  ? `<span class="badge badge-freq">${h.frequency}</span>` : ''}
          </div>
          <div class="habit-card-desc">${h.description || ''}</div>
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }

  // 영양 성분
  const nutrients = rec.nutrients || [];
  const primaryGoalKey = meta.health_goal || '';
  const goalLabelMap = {};
  (meta.goal_labels || []).forEach((lbl, idx) => {
    // goal_keys 배열이 없으므로 index 기반 매핑은 어렵고, goal_key로 직접 매핑
  });
  if (nutrients.length) {
    html += `<div class="result-section"><div class="result-section-title"><span>💊</span> 영양 성분 제안</div><div class="nutrient-list">`;
    nutrients.forEach((n, i) => {
      const c = n.cautions || {};
      const lvl = c.level || 'info';
      const lvlClass = {info:'caution-info',warning:'caution-warning',consult:'caution-consult'}[lvl] || 'caution-info';
      const lvlIcon  = {info:'ℹ️',warning:'⚠️',consult:'🚨'}[lvl] || 'ℹ️';
      const isSecondary = n.goal_key && n.goal_key !== primaryGoalKey;
      const goalLabels = meta.goal_labels || [];
      const GOAL_LABEL_MAP = {
        fatigue_management:'피로 관리', sleep_management:'수면 관리',
        immunity_management:'면역 관리', eye_health:'눈 건강',
        gut_health:'장 건강', bone_health:'뼈 건강',
        skin_antioxidant:'피부·항산화', weight_management:'체중 관리',
        blood_sugar_management:'혈당 관리', stress_management:'스트레스 관리',
        exercise_recovery:'운동 관리', cardiovascular_health:'심혈관 건강',
        hair_health:'모발 건강', liver_health:'간 건강',
      };
      const goalBadge = isSecondary
        ? `<span class="nutrient-goal-badge secondary">${GOAL_LABEL_MAP[n.goal_key] || n.goal_key}</span>`
        : (goalLabels.length > 1 ? `<span class="nutrient-goal-badge primary">${GOAL_LABEL_MAP[primaryGoalKey] || ''}</span>` : '');
      html += `<div class="nutrient-card${isSecondary ? ' secondary-goal' : ''}">
        <div class="nutrient-card-header">
          <div class="nutrient-card-icon">${nutrientIcon(n.name)}</div>
          <div class="nutrient-card-meta">
            <div class="nutrient-card-name">${n.name} ${goalBadge}</div>
            ${n.name_en ? `<div class="nutrient-card-en">${n.name_en}</div>` : ''}
          </div>
          <span class="nutrient-card-rank">${ranks[i] || (i+1)}</span>
        </div>
        ${n.reason ? `<div class="nutrient-card-reason">${n.reason}</div>` : ''}`;
      if ((c.items||[]).length) {
        html += `<div class="nutrient-card-caution ${lvlClass}">
          <div class="caution-title">${lvlIcon} 주의사항</div>
          <ul class="caution-list">`;
        for (const it of c.items) html += `<li>${it}</li>`;
        html += `</ul>`;
        if ((c.interaction_flags||[]).length)
          html += `<div class="interaction-note">🔗 ${c.interaction_flags.join(' / ')}</div>`;
        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  // 쇼핑 검색
  if (nutrients.length) {
    html += `<div class="result-section"><div class="result-section-title"><span>🛒</span> 영양 성분 검색</div>
      <table class="shop-table"><thead><tr><th>성분</th><th>네이버</th><th>쿠팡</th><th>iHerb</th></tr></thead><tbody>`;
    for (const n of nutrients) {
      const qKo = encodeURIComponent(n.name), qEn = encodeURIComponent(n.name_en || n.name);
      html += `<tr>
        <td><strong>${nutrientIcon(n.name)} ${n.name}</strong></td>
        <td><a class="shop-link shop-naver"   href="https://search.shopping.naver.com/search/all?query=${qKo}" target="_blank">검색</a></td>
        <td><a class="shop-link shop-coupang" href="https://www.coupang.com/np/search?q=${qKo}" target="_blank">검색</a></td>
        <td>${n.name_en ? `<a class="shop-link shop-iherb" href="https://www.iherb.com/search?kw=${qEn}" target="_blank">검색</a>` : '-'}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  html += `<div class="disclaimer-box">ℹ️ 이 내용은 의료적 진단이 아닙니다. 복용 중인 약이나 임신·수유 중이라면 전문가 상담이 필요할 수 있어요.</div>`;
  el.innerHTML = html;
}

// ── 공유 (링크 복사) ──────────────────────────────
function shareResult() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    showToast('링크가 복사됐습니다!');
  }).catch(() => {
    prompt('아래 링크를 복사하세요:', url);
  });
}

// ── 저장 (localStorage) ───────────────────────────
function saveResult() {
  if (!lastMeta) return;
  const data = { meta: lastMeta, savedAt: new Date().toLocaleString('ko-KR'), input: { goals: state.goals, age: state.age, gender: state.gender } };
  localStorage.setItem('health_coach_result', JSON.stringify(data));
  showToast('결과가 저장됐습니다! 다음 방문 시 자동으로 불러옵니다.');
}

function loadSavedResult() {
  const raw = localStorage.getItem('health_coach_result');
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    lastMeta = data.meta;
    renderResultCards(data.meta);
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('saved-banner').style.display = 'flex';
    document.getElementById('saved-banner').innerHTML = `💾 저장된 결과 (${data.savedAt}) <button onclick="clearSaved()" class="banner-close">삭제</button><button onclick="document.getElementById('saved-banner').style.display='none'" class="banner-close">✕</button>`;
  } catch(e) { localStorage.removeItem('health_coach_result'); }
}

function clearSaved() {
  localStorage.removeItem('health_coach_result');
  document.getElementById('saved-banner').style.display = 'none';
  showToast('저장된 결과가 삭제됐습니다.');
}

// ── Toast 메시지 ──────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function showError(msg) {
  const err = document.getElementById('error-box');
  err.textContent = '⚠️ ' + msg;
  err.style.display = 'block';
  document.getElementById('form-section').style.display = 'block';
}

function reset() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  document.querySelectorAll('.goal-btn, .chip').forEach(b => b.classList.remove('active'));
  state.goals = []; state.age = ''; state.gender = '';
  updateGoalDisplay();
  updateBtn();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 페이지 로드 시 저장 결과 확인 ────────────────
window.addEventListener('load', loadSavedResult);
</script>

</body>
</html>
