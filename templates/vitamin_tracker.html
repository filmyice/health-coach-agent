<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비타민 트래커 — 건강 코치</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── 비타민 트래커 전용 스타일 ── */
    .vt-wrap { max-width: 860px; margin: 2rem auto; padding: 0 1.25rem 4rem; }

    .vt-hero {
      background: linear-gradient(135deg,#1e3a5f 0%,#1d4ed8 60%,#60a5fa 100%);
      border-radius: 18px; padding: 2rem 2rem 1.75rem;
      color: white; margin-bottom: 2rem;
    }
    .vt-hero h1 { font-size: 1.55rem; font-weight: 800; margin-bottom: .3rem; }
    .vt-hero p  { font-size: .9rem; opacity: .85; }

    /* ── 카메라 / 업로드 영역 ── */
    .vt-cam-area {
      background: white; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius); padding: 1.5rem;
      margin-bottom: 1.5rem; text-align: center;
    }
    [data-theme="dark"] .vt-cam-area { background: var(--surface); border-color: var(--border); }

    #vt-video {
      width: 100%; max-width: 480px; border-radius: 10px;
      background: #000; display: none;
    }
    #vt-canvas { display: none; }
    #vt-preview {
      max-width: 320px; border-radius: 10px;
      display: none; margin: .75rem auto 0;
    }
    .vt-cam-btns { display: flex; flex-wrap: wrap; gap: .6rem; justify-content: center; margin-top: 1rem; }

    .vt-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .6rem 1.2rem; border-radius: 8px; border: none;
      font-size: .9rem; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .vt-btn:hover { opacity: .88; transform: translateY(-1px); }
    .vt-btn-primary   { background: #1d4ed8; color: white; }
    .vt-btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1.5px solid var(--gray-200); }
    [data-theme="dark"] .vt-btn-secondary { background: var(--surface); color: var(--text-primary); border-color: var(--border); }
    .vt-btn-danger    { background: #fee2e2; color: #dc2626; border: 1.5px solid #fca5a5; }
    .vt-btn-green     { background: #dcfce7; color: #15803d; border: 1.5px solid #86efac; }
    .vt-btn:disabled  { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── 스캔 상태 ── */
    .vt-scan-status {
      font-size: .85rem; color: var(--gray-600); margin-top: .75rem;
      min-height: 1.2em;
    }
    [data-theme="dark"] .vt-scan-status { color: var(--text-secondary); }
    .vt-scan-status.loading { color: #1d4ed8; }
    .vt-scan-status.success { color: #15803d; }
    .vt-scan-status.error   { color: #dc2626; }

    /* ── 스캔된 항목 목록 ── */
    .vt-scanned-section h2, .vt-chart-section h2, .vt-detail-section h2 {
      font-size: 1.05rem; font-weight: 700; color: var(--gray-800);
      margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem;
    }
    [data-theme="dark"] .vt-scanned-section h2,
    [data-theme="dark"] .vt-chart-section h2,
    [data-theme="dark"] .vt-detail-section h2 { color: var(--text-primary); }

    .vt-scanned-section { margin-bottom: 1.75rem; }
    .vt-scanned-list { display: flex; flex-direction: column; gap: .55rem; }
    .vt-item-card {
      display: flex; align-items: center; gap: .75rem;
      background: white; border: 1.5px solid var(--gray-200);
      border-radius: 10px; padding: .7rem 1rem;
    }
    [data-theme="dark"] .vt-item-card { background: var(--surface); border-color: var(--border); }
    .vt-item-thumb {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      background: var(--gray-100);
    }
    .vt-item-no-thumb {
      width: 48px; height: 48px; border-radius: 8px;
      background: var(--gray-100); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .vt-item-info { flex: 1; min-width: 0; }
    .vt-item-name { font-size: .9rem; font-weight: 700; color: var(--gray-800); }
    [data-theme="dark"] .vt-item-name { color: var(--text-primary); }
    .vt-item-nutrients {
      display: flex; flex-wrap: wrap; gap: .25rem; margin-top: .3rem;
    }
    .vt-nutrient-pill {
      font-size: .72rem; background: #eff6ff; color: #1d4ed8;
      border: 1px solid #bfdbfe; border-radius: 999px;
      padding: .12rem .5rem;
    }
    [data-theme="dark"] .vt-nutrient-pill { background: #1e3a5f; border-color: #1d4ed8; color: #93c5fd; }
    .vt-item-del {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; color: var(--gray-400);
      padding: .25rem; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .vt-item-del:hover { color: #dc2626; background: #fee2e2; }

    .vt-empty {
      text-align: center; color: var(--gray-400);
      font-size: .88rem; padding: 2rem 1rem;
    }

    /* ── 차트 섹션 ── */
    .vt-chart-section {
      background: white; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius); padding: 1.5rem;
      margin-bottom: 1.75rem;
    }
    [data-theme="dark"] .vt-chart-section { background: var(--surface); border-color: var(--border); }
    .vt-chart-wrap { max-width: 420px; margin: 0 auto; }

    /* ── 상세 프로그레스 바 섹션 ── */
    .vt-detail-section {
      background: white; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius); padding: 1.5rem;
      margin-bottom: 1.75rem;
    }
    [data-theme="dark"] .vt-detail-section { background: var(--surface); border-color: var(--border); }

    .vt-progress-list { display: flex; flex-direction: column; gap: 1rem; }
    .vt-progress-item {}
    .vt-prog-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: .35rem;
    }
    .vt-prog-name { font-size: .88rem; font-weight: 700; color: var(--gray-800); }
    [data-theme="dark"] .vt-prog-name { color: var(--text-primary); }
    .vt-prog-val  { font-size: .8rem; color: var(--gray-500); }
    .vt-prog-bar-bg {
      height: 10px; background: var(--gray-100); border-radius: 99px;
      overflow: hidden; position: relative;
    }
    .vt-prog-bar-fill {
      height: 100%; border-radius: 99px;
      transition: width .5s ease;
      max-width: 100%;
    }
    .vt-prog-pct {
      font-size: .78rem; font-weight: 700;
      margin-top: .25rem; text-align: right;
    }
    .pct-low     { color: var(--gray-400); }
    .pct-ok      { color: #15803d; }
    .pct-high    { color: #f59e0b; }
    .pct-over    { color: #dc2626; }

    /* ── 초기화 버튼 행 ── */
    .vt-actions { display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 1.75rem; }

    /* ── 파일 input 숨기기 ── */
    #vt-file-input { display: none; }

    @media (max-width: 600px) {
      .vt-hero { padding: 1.5rem 1.25rem; }
      .vt-hero h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" style="display:flex;align-items:center;gap:.5rem;text-decoration:none;">
    <span class="logo">🌿</span>
    <span class="brand">건강 코치 에이전트</span>
  </a>
  <span class="tagline" style="margin-left:auto;">비타민 트래커</span>
  <button class="btn-dark-mode" id="dark-mode-btn" onclick="toggleDarkMode()" title="다크 모드">
    <span id="dark-mode-icon">🌙</span>
  </button>
</header>

<div class="vt-wrap">

  <!-- 히어로 -->
  <div class="vt-hero">
    <h1>💊 비타민 트래커</h1>
    <p>제품 용기를 촬영하면 AI가 성분을 인식하고 하루 권장 섭취량(RDA) 대비 섭취량을 보여드립니다</p>
  </div>

  <!-- 카메라 / 업로드 -->
  <div class="vt-cam-area">
    <video id="vt-video" autoplay playsinline></video>
    <canvas id="vt-canvas"></canvas>
    <img id="vt-preview" alt="촬영된 이미지" />
    <input type="file" id="vt-file-input" accept="image/*" capture="environment" />

    <div class="vt-cam-btns">
      <button class="vt-btn vt-btn-primary" id="btn-open-cam" onclick="openCamera()">📷 카메라 열기</button>
      <button class="vt-btn vt-btn-secondary" onclick="document.getElementById('vt-file-input').click()">🖼️ 사진 선택</button>
      <button class="vt-btn vt-btn-primary" id="btn-capture" onclick="capturePhoto()" style="display:none">📸 촬영</button>
      <button class="vt-btn vt-btn-danger" id="btn-stop-cam" onclick="stopCamera()" style="display:none">✕ 카메라 끄기</button>
    </div>
    <div class="vt-scan-status" id="vt-status">비타민 용기 라벨이 잘 보이도록 촬영하세요</div>
  </div>

  <!-- 스캔된 제품 목록 -->
  <div class="vt-actions">
    <button class="vt-btn vt-btn-danger" onclick="clearAll()">🗑️ 전체 초기화</button>
  </div>

  <div class="vt-scanned-section">
    <h2>📋 스캔된 제품 <span id="item-count-badge" style="font-size:.8rem;font-weight:600;color:var(--gray-400);"></span></h2>
    <div class="vt-scanned-list" id="scanned-list">
      <div class="vt-empty" id="vt-empty-msg">아직 스캔된 제품이 없습니다.<br>비타민 용기를 촬영해보세요!</div>
    </div>
  </div>

  <!-- 방사형 차트 -->
  <div class="vt-chart-section" id="vt-chart-section" style="display:none">
    <h2>📊 누적 섭취량 비교 (RDA %)</h2>
    <div class="vt-chart-wrap">
      <canvas id="vt-radar-chart"></canvas>
    </div>
  </div>

  <!-- 상세 프로그레스 바 -->
  <div class="vt-detail-section" id="vt-detail-section" style="display:none">
    <h2>🔬 성분별 상세</h2>
    <div class="vt-progress-list" id="vt-progress-list"></div>
  </div>

</div><!-- /vt-wrap -->

<script>
/* ──────────────────────────────────────────────────────────
   한국인 영양소 섭취기준 (KDRI 2020, 성인 기준 RDA/AI)
   단위 통일: mg (mcg × 0.001 로 변환)
────────────────────────────────────────────────────────── */
const RDA = {
  "비타민A":   { rda: 700,       unit: "mcg" },   // mcg RAE
  "비타민B1":  { rda: 1.2,       unit: "mg"  },
  "비타민B2":  { rda: 1.4,       unit: "mg"  },
  "비타민B3":  { rda: 16,        unit: "mg"  },   // 나이아신
  "나이아신":  { rda: 16,        unit: "mg"  },
  "비타민B5":  { rda: 5,         unit: "mg"  },   // 판토텐산
  "판토텐산":  { rda: 5,         unit: "mg"  },
  "비타민B6":  { rda: 1.5,       unit: "mg"  },
  "비타민B7":  { rda: 0.03,      unit: "mg"  },   // 비오틴 30mcg
  "비오틴":    { rda: 0.03,      unit: "mg"  },
  "비타민B9":  { rda: 0.4,       unit: "mg"  },   // 엽산 400mcg
  "엽산":      { rda: 0.4,       unit: "mg"  },
  "비타민B12": { rda: 0.0024,    unit: "mg"  },   // 2.4mcg
  "비타민C":   { rda: 100,       unit: "mg"  },
  "비타민D":   { rda: 0.015,     unit: "mg"  },   // 15mcg = 600IU
  "비타민E":   { rda: 12,        unit: "mg"  },   // mg α-TE
  "비타민K":   { rda: 0.075,     unit: "mg"  },   // 75mcg
  "칼슘":      { rda: 800,       unit: "mg"  },
  "마그네슘":  { rda: 350,       unit: "mg"  },
  "철":        { rda: 12,        unit: "mg"  },   // 남성 기준
  "철분":      { rda: 12,        unit: "mg"  },
  "아연":      { rda: 10,        unit: "mg"  },
  "셀레늄":    { rda: 0.055,     unit: "mg"  },   // 55mcg
  "구리":      { rda: 0.8,       unit: "mg"  },
  "망간":      { rda: 4,         unit: "mg"  },
  "요오드":    { rda: 0.15,      unit: "mg"  },   // 150mcg
  "크롬":      { rda: 0.03,      unit: "mg"  },   // 30mcg
  "몰리브덴":  { rda: 0.025,     unit: "mg"  },   // 25mcg
  "인":        { rda: 700,       unit: "mg"  },
  "칼륨":      { rda: 3500,      unit: "mg"  },
  "오메가3":   { rda: 500,       unit: "mg"  },   // EPA+DHA AI
  "EPA":       { rda: 500,       unit: "mg"  },
  "DHA":       { rda: 500,       unit: "mg"  },
  "루테인":    { rda: 10,        unit: "mg"  },   // 비공식 권장
  "코엔자임Q10":{ rda: 100,      unit: "mg"  },
  "콜라겐":    { rda: 2500,      unit: "mg"  },
};

/* IU 변환 테이블 (단위: mg 기준) */
const IU_TO_MG = {
  "비타민A":  0.0003,  // 1 IU ≈ 0.3 mcg = 0.0003 mg
  "비타민D":  0.000025,// 1 IU = 0.025 mcg = 0.000025 mg
  "비타민E":  0.00067, // 1 IU ≈ 0.67 mg
};

function toMg(name, amount, unit) {
  const u = (unit || "").toLowerCase().trim();
  let v = parseFloat(amount) || 0;
  if (u === "mg") return v;
  if (u === "mcg" || u === "μg" || u === "ug") return v * 0.001;
  if (u === "g")  return v * 1000;
  if (u === "iu") {
    const factor = IU_TO_MG[name] || 0.001;
    return v * factor;
  }
  return v; // fallback
}

function calcPercent(name, amount, unit) {
  const entry = RDA[name];
  if (!entry) return null;
  const mg = toMg(name, amount, unit);
  const rdaMg = toMg(name, entry.rda, entry.unit);
  if (!rdaMg) return null;
  return Math.round((mg / rdaMg) * 100);
}

/* ──────────────────────────────────────────────────────────
   localStorage 상태 관리
────────────────────────────────────────────────────────── */
const STORAGE_KEY = "vt_vitamins";

function loadItems() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveItems(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

/* ──────────────────────────────────────────────────────────
   카메라 / 이미지 처리
────────────────────────────────────────────────────────── */
let stream = null;

async function openCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
    const video = document.getElementById("vt-video");
    video.srcObject = stream;
    video.style.display = "block";
    document.getElementById("btn-open-cam").style.display = "none";
    document.getElementById("btn-capture").style.display = "";
    document.getElementById("btn-stop-cam").style.display = "";
    document.getElementById("vt-preview").style.display = "none";
    setStatus("카메라가 준비되었습니다. 라벨을 비추고 촬영하세요.", "");
  } catch {
    setStatus("카메라 접근 실패 — 사진 선택을 이용해주세요.", "error");
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const video = document.getElementById("vt-video");
  video.style.display = "none";
  document.getElementById("btn-open-cam").style.display = "";
  document.getElementById("btn-capture").style.display = "none";
  document.getElementById("btn-stop-cam").style.display = "none";
}

async function capturePhoto() {
  const video = document.getElementById("vt-video");
  const canvas = document.getElementById("vt-canvas");
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  const b64 = resizeCanvas(canvas, 1024);
  stopCamera();
  showPreview(b64);
  await scanImage(b64);
}

document.getElementById("vt-file-input").addEventListener("change", async function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const b64raw = e.target.result; // data:image/...;base64,...
    const canvas = document.getElementById("vt-canvas");
    const img = new Image();
    img.onload = async () => {
      canvas.width = img.width; canvas.height = img.height;
      canvas.getContext("2d").drawImage(img, 0, 0);
      const b64 = resizeCanvas(canvas, 1024);
      showPreview(b64);
      await scanImage(b64);
    };
    img.src = b64raw;
  };
  reader.readAsDataURL(file);
  this.value = "";
});

function resizeCanvas(canvas, maxSize) {
  let { width: w, height: h } = canvas;
  if (w > maxSize || h > maxSize) {
    const r = Math.min(maxSize / w, maxSize / h);
    w = Math.round(w * r); h = Math.round(h * r);
  }
  const tmp = document.createElement("canvas");
  tmp.width = w; tmp.height = h;
  tmp.getContext("2d").drawImage(canvas, 0, 0, w, h);
  return tmp.toDataURL("image/jpeg", 0.82);
}

function showPreview(b64) {
  const img = document.getElementById("vt-preview");
  img.src = b64;
  img.style.display = "block";
}

/* ──────────────────────────────────────────────────────────
   API 호출 → 아이템 저장
────────────────────────────────────────────────────────── */
async function scanImage(b64) {
  setStatus("🔍 AI가 라벨을 분석 중입니다...", "loading");
  const btnCapture = document.getElementById("btn-capture");
  if (btnCapture) btnCapture.disabled = true;

  try {
    const res = await fetch("/api/scan-vitamin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image: b64 }),
    });
    const data = await res.json();
    if (data.error) { setStatus("오류: " + data.error, "error"); return; }

    const nutrients = data.nutrients || [];
    if (!nutrients.length) {
      setStatus(data.warning || "성분을 인식하지 못했습니다. 다시 촬영해보세요.", "error");
      return;
    }

    const label = data.source === "search"
      ? `🌐 "${data.product_name}" 검색으로 ${nutrients.length}가지 성분 확인`
      : `✅ 라벨에서 ${nutrients.length}가지 성분 인식 완료`;

    const items = loadItems();
    items.push({ id: Date.now(), thumb: b64, nutrients, product_name: data.product_name || "" });
    saveItems(items);
    renderAll();
    setStatus(label, "success");
  } catch(e) {
    setStatus("네트워크 오류가 발생했습니다.", "error");
  } finally {
    if (btnCapture) btnCapture.disabled = false;
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById("vt-status");
  el.textContent = msg;
  el.className = "vt-scan-status" + (cls ? " " + cls : "");
}

/* ──────────────────────────────────────────────────────────
   렌더링
────────────────────────────────────────────────────────── */
let radarChart = null;

function renderAll() {
  const items = loadItems();
  renderList(items);
  const totals = aggregateNutrients(items);
  renderChart(totals);
  renderDetail(totals);
}

function renderList(items) {
  const list = document.getElementById("scanned-list");
  const empty = document.getElementById("vt-empty-msg");
  const badge = document.getElementById("item-count-badge");
  badge.textContent = items.length ? `(${items.length}개)` : "";

  if (!items.length) {
    list.innerHTML = "";
    list.appendChild(empty);
    return;
  }
  if (empty.parentNode === list) list.removeChild(empty);

  list.innerHTML = items.map((item, idx) => {
    const pills = item.nutrients.map(n =>
      `<span class="vt-nutrient-pill">${n.name} ${n.amount}${n.unit}</span>`
    ).join("");
    const thumbHtml = item.thumb
      ? `<img class="vt-item-thumb" src="${item.thumb}" alt="" loading="lazy" />`
      : `<div class="vt-item-no-thumb">💊</div>`;
    const nameLabel = item.product_name || `제품 ${idx + 1}`;
    return `
      <div class="vt-item-card">
        ${thumbHtml}
        <div class="vt-item-info">
          <div class="vt-item-name">${nameLabel}</div>
          <div class="vt-item-nutrients">${pills}</div>
        </div>
        <button class="vt-item-del" onclick="deleteItem(${item.id})" title="삭제">✕</button>
      </div>`;
  }).join("");
}

function aggregateNutrients(items) {
  const map = {};
  items.forEach(item => {
    item.nutrients.forEach(n => {
      if (!map[n.name]) map[n.name] = { amount: 0, unit: n.unit };
      map[n.name].amount += toMg(n.name, n.amount, n.unit); // store in mg
    });
  });
  return map; // { name: { amount(mg), unit } }
}

function renderChart(totals) {
  const chartSection = document.getElementById("vt-chart-section");
  const names = Object.keys(totals);
  if (!names.length) { chartSection.style.display = "none"; return; }
  chartSection.style.display = "";

  // only include nutrients that have an RDA entry
  const known = names.filter(n => RDA[n]);
  if (!known.length) { chartSection.style.display = "none"; return; }

  // limit to 12 nutrients for readability
  const display = known.slice(0, 12);
  const labels  = display;
  const data    = display.map(n => {
    const pct = calcPctFromMg(n, totals[n].amount);
    return Math.min(pct, 200); // cap at 200%
  });

  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  const textColor = isDark ? "#e5e7eb" : "#374151";
  const gridColor = isDark ? "rgba(255,255,255,.1)" : "rgba(0,0,0,.08)";

  const ctx = document.getElementById("vt-radar-chart").getContext("2d");
  if (radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, {
    type: "radar",
    data: {
      labels,
      datasets: [{
        label: "섭취량 (RDA %)",
        data,
        backgroundColor: "rgba(29,78,216,.18)",
        borderColor: "#1d4ed8",
        borderWidth: 2,
        pointBackgroundColor: data.map(v => v >= 100 ? "#dc2626" : "#1d4ed8"),
        pointRadius: 4,
      }],
    },
    options: {
      responsive: true,
      scales: {
        r: {
          min: 0, max: 200,
          ticks: { stepSize: 50, color: textColor, backdropColor: "transparent", font: { size: 10 } },
          grid: { color: gridColor },
          angleLines: { color: gridColor },
          pointLabels: { color: textColor, font: { size: 11, weight: "700" } },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw}% of RDA`,
          },
        },
      },
    },
  });
}

function calcPctFromMg(name, amountMg) {
  const entry = RDA[name];
  if (!entry) return 0;
  const rdaMg = toMg(name, entry.rda, entry.unit);
  if (!rdaMg) return 0;
  return Math.round((amountMg / rdaMg) * 100);
}

function renderDetail(totals) {
  const detailSection = document.getElementById("vt-detail-section");
  const list = document.getElementById("vt-progress-list");
  const names = Object.keys(totals);
  if (!names.length) { detailSection.style.display = "none"; return; }
  detailSection.style.display = "";

  const rows = names.map(n => {
    const amtMg = totals[n].amount;
    const pct   = calcPctFromMg(n, amtMg);
    const rdaEntry = RDA[n];
    const rdaLabel = rdaEntry
      ? `/ ${rdaEntry.rda} ${rdaEntry.unit} 권장`
      : "(RDA 정보 없음)";

    // display original unit
    let dispAmt;
    if (rdaEntry && rdaEntry.unit === "mcg") dispAmt = `${(amtMg * 1000).toFixed(1)} mcg`;
    else if (rdaEntry && rdaEntry.unit === "mg") dispAmt = `${amtMg < 1 ? amtMg.toFixed(3) : amtMg.toFixed(1)} mg`;
    else dispAmt = `${amtMg.toFixed(2)} mg`;

    const barColor = pct === null ? "#9ca3af"
      : pct < 30  ? "#9ca3af"
      : pct < 100 ? "#1d4ed8"
      : pct < 150 ? "#22c55e"
      : "#f59e0b";
    const pctClass = pct === null ? "pct-low"
      : pct < 30  ? "pct-low"
      : pct < 100 ? "pct-ok"
      : pct < 150 ? "pct-ok"
      : pct < 200 ? "pct-high"
      : "pct-over";
    const pctStr = pct !== null ? `${pct}%` : "—";

    return `
      <div class="vt-progress-item">
        <div class="vt-prog-header">
          <span class="vt-prog-name">${n}</span>
          <span class="vt-prog-val">${dispAmt} ${rdaLabel}</span>
        </div>
        <div class="vt-prog-bar-bg">
          <div class="vt-prog-bar-fill" style="width:${Math.min(pct||0,100)}%;background:${barColor}"></div>
        </div>
        <div class="vt-prog-pct ${pctClass}">${pctStr}</div>
      </div>`;
  }).join("");
  list.innerHTML = rows;
}

function deleteItem(id) {
  const items = loadItems().filter(i => i.id !== id);
  saveItems(items);
  renderAll();
}

function clearAll() {
  if (!confirm("스캔된 모든 제품을 초기화할까요?")) return;
  saveItems([]);
  renderAll();
  setStatus("초기화되었습니다.", "");
  document.getElementById("vt-preview").style.display = "none";
}

/* ──────────────────────────────────────────────────────────
   다크 모드 (공유)
────────────────────────────────────────────────────────── */
function toggleDarkMode() {
  const html = document.documentElement;
  const isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  document.getElementById("dark-mode-icon").textContent = isDark ? "🌙" : "☀️";
  localStorage.setItem("darkMode", isDark ? "0" : "1");
  if (radarChart) {
    const items = loadItems();
    renderChart(aggregateNutrients(items));
  }
}

(function initTheme() {
  if (localStorage.getItem("darkMode") === "1") {
    document.documentElement.setAttribute("data-theme", "dark");
    const icon = document.getElementById("dark-mode-icon");
    if (icon) icon.textContent = "☀️";
  }
})();

/* ── 초기 렌더 ── */
renderAll();
</script>
